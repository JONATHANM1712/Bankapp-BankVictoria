<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Laporan Kredit</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="container">
    <h1>Laporan Data Kredit</h1>

    <button onclick="window.print()" class="btn-print">
        Cetak
    </button>

<table class="data-table">
    <thead>
        <tr>
            <th>No</th>
            <th>Nama Pemohon</th>
            <th>Jumlah Pinjaman</th>
            <th>Tenor</th>
            <th>Bunga Tahunan</th>
            <th>Cicilan Per Bulan</th>
        </tr>
    </thead>

    <tbody>
        <tr th:each="k, stat : ${kreditList}">
            <td th:text="${stat.count}"></td>
            <td th:text="${k.namaPemohon}"></td>
            <td th:text="${k.jumlahPinjaman}"></td>
            <td th:text="${k.tenor}"></td>
            <td th:text="${k.bungaTahunan}"></td>
            <td th:text="${k.cicilanPerBulan}"></td>
        </tr>
    </tbody>
</table>
</div>

</body>
</html>
