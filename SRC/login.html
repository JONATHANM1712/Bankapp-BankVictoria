<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Bank Victoria</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="login-bg">

<div class="login-box">

    <div class="auth-brand">
        <img th:src="@{/images/Bank_Victoria_logo.png}"
             alt="Bank Victoria"
             class="logo-bank-auth">
    </div>


    <p class="subtitle">
        Masuk untuk mengelola data nasabah, kredit, laporan, audit log, dan database.
    </p>

    <div th:if="${error}" class="alert-error">
        <span th:text="${error}"></span>
    </div>

    <form th:action="@{/login}" method="post">

        <input type="text"
               name="username"
               placeholder="Username atau Email"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

<div class="captcha-box">

    <label><b>CAPTCHA</b></label>

    <div class="captcha-question">
        <span th:text="${captchaSoal}"></span>
    </div>

    <input type="number"
           name="captcha"
           placeholder="Jawaban CAPTCHA"
           required>

</div>

        <button type="submit">Login</button>

    </form>

    <p class="register-link">
        Belum punya akun?
        <a th:href="@{/registrasi}">Registrasi</a>
    </p>

</div>

</body>
</html>
