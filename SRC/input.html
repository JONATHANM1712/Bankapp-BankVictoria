<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">

    <title>Input Nasabah</title>

    <link rel="stylesheet"
          th:href="@{/css/style.css}">
</head>

<body class="input-bg">

<nav class="sidebar">

<div class="sidebar-logo">
    <img th:src="@{/images/Bank_Victoria_logo.png}"
         alt="Bank Victoria"
         class="logo-bank-sidebar">
</div>

    <div class="sidebar-menu">

        <a th:href="@{/}">
            🏠 Beranda
        </a>

        <a th:href="@{/input}">
            ➕ Input Nasabah
        </a>

        <a th:href="@{/daftar}">
            👥 Daftar Nasabah
        </a>

        <a th:href="@{/simulasi}">
            💳 Simulasi Kredit
        </a>

        <a th:href="@{/daftar-kredit}">
            📋 Daftar Kredit
        </a>

        <a th:href="@{/laporan}">
            📊 Laporan
        </a>

        <a th:href="@{/tentang}">
            ℹ️ Tentang Aplikasi
        </a>

        <a th:if="${session.userLogin != null and session.userLogin.role == 'ADMIN'}"
           th:href="@{/users}">
            👤 Manajemen User
        </a>

        <a th:if="${session.userLogin != null and session.userLogin.role == 'ADMIN'}"
           th:href="@{/audit-log}">
            📝 Audit Log
        </a>

        <a th:if="${session.userLogin != null and session.userLogin.role == 'ADMIN'}"
           th:href="@{/database}">
            🗄️ Database
        </a>

        <a th:href="@{/ganti-password}">
    🔐 Ganti Password
</a>

    </div>

    <div class="sidebar-user">

        <div class="login-user">
            👤
            <span th:text="${session.username}">
                postgres
            </span>
        </div>

        <a th:href="@{/logout}"
           class="logout-btn">
            🚪 Logout
        </a>

    </div>

</nav>

<div class="container">


    <h1 th:text="${modeEdit} ? 'Edit Data Nasabah Fiktif' : 'Input Data Nasabah Fiktif'">
        Input Data Nasabah Fiktif
    </h1>

    <div th:if="${error}"
         class="alert-error toast-message"
         th:text="${error}">
    </div>

    <div th:if="${success}"
         class="alert-success toast-message"
         th:text="${success}">
    </div>

<form th:action="${modeEdit} ? @{/update/{oldCif}(oldCif=${nasabah.nomorCif})} : @{/simpan}"
      th:object="${nasabah}"
      method="post"
      class="bank-form form-validasi form-loading">

<label for="nomorCif">
    Nomor CIF
</label>

<input id="nomorCif"
       type="text"
       th:field="*{nomorCif}"
       placeholder="Masukkan Nomor CIF"
       minlength="9"
       maxlength="9"
       pattern="[A-Z0-9]{9}"
       oninput="this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '')"
       required>

        <br>

        <label for="namaNasabah">
            Nama Nasabah
        </label>

        <input id="namaNasabah"
               type="text"
               th:field="*{namaNasabah}"
               placeholder="Nama Nasabah"
               maxlength="80"
               oninput="this.value = this.value.toUpperCase().replace(/[^A-Z\s]/g, '')"
               required>

        <br>

        <label for="nomorKtp">
            Nomor KTP
        </label>

        <input id="nomorKtp"
               type="text"
               th:field="*{nomorKtp}"
               placeholder="Nomor KTP"
               minlength="16"
               maxlength="16"
               pattern="[0-9]{16}"
               oninput="this.value = this.value.replace(/[^0-9]/g, '')"
               required>

        <br>

        <label for="alamat">
            Alamat
        </label>

        <input id="alamat"
               type="text"
               th:field="*{alamat}"
               placeholder="Alamat"
               maxlength="150"
               required>

        <br>

        <label for="handphone">
            Handphone
        </label>

        <input id="handphone"
               type="text"
               th:field="*{handphone}"
               placeholder="Handphone"
               maxlength="15"
               pattern="[0-9]+"
               oninput="this.value = this.value.replace(/[^0-9]/g, '')"
               required>

        <br>

        <label for="nomorRekening">
            Nomor Rekening
        </label>

        <input id="nomorRekening"
               type="text"
               th:field="*{nomorRekening}"
               placeholder="Nomor Rekening"
               minlength="8"
               maxlength="10"
               pattern="[0-9]{8,10}"
               oninput="this.value = this.value.replace(/[^0-9]/g, '')"
               required>

        <br>

        <label for="tanggalBukaRekening">
            Tanggal Buka Rekening
        </label>

        <input id="tanggalBukaRekening"
               type="date"
               name="tanggalBukaRekening"
               th:value="${nasabah.tanggalBukaRekening != null ? #temporals.format(nasabah.tanggalBukaRekening, 'yyyy-MM-dd') : ''}"
               required>

        <br>

        <label for="saldo">
            Saldo
        </label>

        <input id="saldo"
               type="number"
               th:field="*{saldo}"
               placeholder="Saldo"
               min="0"
               step="0.01"
               required>

        <br>

        <button type="submit"
                th:text="${modeEdit} ? 'Update' : 'Simpan'">
            Simpan
        </button>

        <a class="batal"
           th:if="${modeEdit}"
           th:href="@{/daftar}">
            Batal Edit
        </a>

    </form>

</div>

<div id="loadingOverlay"
     class="loading-overlay">
    <div class="spinner"></div>
    <p>Memproses data...</p>
</div>

<script th:src="@{/js/app-ui.js}"></script>

</body>
</html>
