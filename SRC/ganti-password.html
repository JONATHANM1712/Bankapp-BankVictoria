<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Ganti Password</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="user-bg">

<nav class="sidebar">

<div class="sidebar-logo">
    <img th:src="@{/images/Bank_Victoria_logo.png}"
         alt="Bank Victoria"
         class="logo-bank-sidebar">
</div>

    <div class="sidebar-menu">
        <a th:href="@{/}">🏠 Beranda</a>
        <a th:href="@{/input}">➕ Input Nasabah</a>
        <a th:href="@{/daftar}">👥 Daftar Nasabah</a>
        <a th:href="@{/simulasi}">💳 Simulasi Kredit</a>
        <a th:href="@{/daftar-kredit}">📋 Daftar Kredit</a>
        <a th:href="@{/laporan}">📊 Laporan</a>
        <a th:href="@{/tentang}">ℹ️ Tentang Aplikasi</a>

        <a th:if="${session.userLogin != null and session.userLogin.role == 'ADMIN'}"
           th:href="@{/users}">
            👤 Manajemen User
        </a>

        <a th:if="${session.userLogin != null and session.userLogin.role == 'ADMIN'}"
           th:href="@{/audit-log}">
            📝 Audit Log
        </a>

        <a th:if="${session.userLogin != null and session.userLogin.role == 'ADMIN'}"
           th:href="@{/database}">
            🗄️ Database
        </a>
      <a th:href="@{/ganti-password}">🔐 Ganti Password</a>
    </div>

    <div class="sidebar-user">
        <div class="login-user">
            👤 <span th:text="${session.username}">User</span>
        </div>

        <a th:href="@{/logout}" class="logout-btn">
            🚪 Logout
        </a>
    </div>

</nav>

<div class="container">

    <h1>Ganti Password</h1>

    <p>
        Gunakan halaman ini untuk mengganti password akun Anda.
    </p>

    <div th:if="${success}"
         class="alert-success">
        <span th:text="${success}"></span>
    </div>

    <div th:if="${error}"
         class="alert-error">
        <span th:text="${error}"></span>
    </div>

    <form th:action="@{/ganti-password}"
          method="post"
          class="form-box">

        <div class="form-group">
            <label>Password Lama</label>
            <input type="password"
                   name="passwordLama"
                   placeholder="Masukkan password lama"
                   required>
        </div>

        <div class="form-group">
            <label>Password Baru</label>
            <input type="password"
                   id="passwordBaru"
                   name="passwordBaru"
                   placeholder="Minimal 6 karakter"
                   oninput="cekStrengthPassword()"
                   required>
            <div class="password-strength">
                <div id="strengthBar" class="strength-bar"></div>
                <span id="strengthText">█░░░░ Lemah</span>
            </div>
        </div>

        <div class="form-group">
            <label>Konfirmasi Password Baru</label>
            <input type="password"
                   name="konfirmasiPassword"
                   placeholder="Ulangi password baru"
                   required>
        </div>

        <div class="form-actions">
            <button type="submit" class="save-btn">
                Simpan Password
            </button>

            <a th:href="@{/}" class="cancel-btn">
                Batal
            </a>
        </div>

    </form>

</div>

<script>
function cekStrengthPassword() {
    const pw = document.getElementById("passwordBaru").value;
    const bar = document.getElementById("strengthBar");
    const text = document.getElementById("strengthText");
    let skor = 0;
    if (pw.length >= 6) skor++;
    if (pw.length >= 10) skor++;
    if (/[A-Z]/.test(pw)) skor++;
    if (/[0-9]/.test(pw)) skor++;
    if (/[^A-Za-z0-9]/.test(pw)) skor++;

    bar.className = "strength-bar";
    if (skor <= 2) { bar.classList.add("weak"); text.innerText = "█░░░░ Lemah"; }
    else if (skor <= 4) { bar.classList.add("medium"); text.innerText = "███░░ Sedang"; }
    else { bar.classList.add("strong"); text.innerText = "█████ Sangat Kuat"; }
}
</script>

</body>
</html>
